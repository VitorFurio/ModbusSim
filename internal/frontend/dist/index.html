<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModbusSim</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #0f172a;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      margin: 1rem;
    }
    h1 { color: #f1f5f9; font-size: 1.25rem; margin-bottom: 0.5rem; }
    p  { font-size: 0.875rem; margin-bottom: 1rem; line-height: 1.6; }
    pre {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: #60a5fa;
      margin-bottom: 1rem;
      overflow-x: auto;
    }
    .note { font-size: 0.75rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ModbusSim — frontend not built</h1>
    <p>The web UI was not embedded in this binary. Build with:</p>
    <pre>make build</pre>
    <p>Or, to run in development mode (hot reload):</p>
    <pre>go run ./cmd/modbussim/ &amp;
cd web &amp;&amp; npm install &amp;&amp; npm run dev</pre>
    <p class="note">The Modbus TCP server and REST API are running normally on their configured ports.</p>
  </div>
</body>
</html>
