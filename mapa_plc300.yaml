version: "1"
name: mapa_plc300
description: Mapa Modbus WEG PLC300 — contadores PCF_DI01-DI10 e status tags

modbus_addr: ":5020"
admin_addr: ":1254"

registers:

  # ── Contadores PCF_DI01 a DI10 ───────────────────────────────────────────────
  - id: pcf_di01_contador
    name: PCF_DI01_CONTADOR
    address: 28040
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di02_contador
    name: PCF_DI02_CONTADOR
    address: 28042
    data_type: int32
