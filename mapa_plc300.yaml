version: "1"
name: mapa_plc300
description: Mapa Modbus WEG PLC300 — contadores PCF_DI01-DI10 e status tags

# Enderecos em formato offset (0-based, usados diretamente no FC03).
# Todos os registradores sao DINT (32 bits = int32 = 2 words Modbus consecutivos).
modbus_addr: ":5020"
admin_addr: ":1254"

registers:

  # ── Contadores PCF_DI01 a DI10 ───────────────────────────────────────────────
  # Cada DINT ocupa 2 words consecutivos: DI01 usa offsets 28040-28041, etc.
  # Sinal: counter incrementando 1 a cada segundo, limite 1.000.000.000.

  - id: pcf_di01_contador
    name: PCF_DI01_CONTADOR
    address: 8040
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di02_contador
    name: PCF_DI02_CONTADOR
    address: 8042
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di03_contador
    name: PCF_DI03_CONTADOR
    address: 8044
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di04_contador
    name: PCF_DI04_CONTADOR
    address: 8046
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di05_contador
    name: PCF_DI05_CONTADOR
    address: 8048
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di06_contador
    name: PCF_DI06_CONTADOR
    address: 8050
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di07_contador
    name: PCF_DI07_CONTADOR
    address: 8052
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di08_contador
    name: PCF_DI08_CONTADOR
    address: 8054
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di09_contador
    name: PCF_DI09_CONTADOR
    address: 8056
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  - id: pcf_di10_contador
    name: PCF_DI10_CONTADOR
    address: 8058
    data_type: int32
    signal:
      kind: counter
      step_min: 1
      interval_ms: 1000
      min: 0
      max: 1000000000

  # ── Status Tags PCF_DI01 a DI10 ──────────────────────────────────────────────
  # Sinal: constante 0 (sem alarme / sem falha).

  - id: pcf_di01_statustag
    name: PCF_DI01_STATUSTAG
    address: 8060
    data_type: int32
    signal:
      kind: constant
      value: 0

  - id: pcf_di02_statustag
    name: PCF_DI02_STATUSTAG
    address: 8062
    data_type: int32
    signal:
      kind: constant
      value: 0

  - id: pcf_di03_statustag
    name: PCF_DI03_STATUSTAG
    address: 8064
    data_type: int32
    signal:
      kind: constant
      value: 0

  - id: pcf_di04_statustag
